<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบรับสมัครงาน ATS | AKR-OHR-FM-001 | Akara Resources PCL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --primary:#1a4f8a;--primary-light:#e8f0fb;--accent:#c8a84b;
  --border:#d0d7e2;--bg:#f4f6f9;--white:#ffffff;
  --text:#1e2a3a;--muted:#6b7a8d;--danger:#c0392b;--success:#1a7a4a;--warn:#b07d10;
  --radius:6px;--shadow:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',Tahoma,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
/* Header */
.app-header{background:var(--primary);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.app-header .logo{display:flex;align-items:center;gap:12px;font-weight:600;font-size:15px}
.app-header .logo img{height:34px;background:#fff;border-radius:5px;padding:3px 8px}
.app-header .logo span{font-size:11px;opacity:.8;font-weight:400;border-left:1px solid rgba(255,255,255,.3);padding-left:10px}
.doc-badge{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:4px;font-size:11px;font-family:monospace;letter-spacing:.5px}
.hr-link{font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;margin-left:12px;text-decoration:underline}
.hr-link:hover{color:#fff}
/* Layout */
.container{max-width:980px;margin:24px auto;padding:0 16px}
.container.wide{max-width:1200px}
/* Stepper */
.stepper{display:flex;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;gap:0;overflow-x:auto;box-shadow:var(--shadow)}
.step-item{flex:1;min-width:80px;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer}
.step-item::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:1px;background:var(--border);z-index:0}
.step-item:last-child::after{display:none}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:2px solid var(--border);background:var(--white);z-index:1;transition:all .2s}
.step-item.done .step-dot{background:var(--success);border-color:var(--success);color:#fff}
.step-item.active .step-dot{background:var(--primary);border-color:var(--primary);color:#fff}
.step-label{font-size:10px;margin-top:5px;color:var(--muted);text-align:center;white-space:nowrap}
.step-item.active .step-label{color:var(--primary);font-weight:600}
/* Card */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.card-header{display:flex;align-items:center;gap:8px;padding-bottom:12px;margin-bottom:18px;border-bottom:2px solid var(--primary-light)}
.card-header .icon{width:32px;height:32px;background:var(--primary-light);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.card-header h2{font-size:15px;font-weight:600;color:var(--primary)}
.card-header small{font-size:11px;color:var(--muted);margin-left:4px}
/* Form */
.form-grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:2fr 2fr 1fr}
.g4{grid-template-columns:2fr 2fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--muted);font-weight:500}
.form-group label .th{color:var(--text)}
.form-group label .en{color:var(--muted);font-size:11px}
.form-group input,.form-group select,.form-group textarea{
  padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);
  font-size:13px;font-family:inherit;background:#fff;color:var(--text);
  transition:border-color .15s,box-shadow .15s;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,79,138,.1)}
.form-group textarea{resize:vertical;min-height:60px}
.form-group input.err{border-color:var(--danger)}
.err-msg{color:var(--danger);font-size:11px}
.section-label{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:1px;background:var(--primary-light)}
.radio-group{display:flex;flex-wrap:wrap;gap:6px}
.radio-btn{padding:5px 12px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;user-select:none}
.radio-btn.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:600}
.work-block{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;position:relative}
.work-block-num{position:absolute;top:-10px;left:12px;background:var(--primary);color:#fff;font-size:10px;padding:1px 8px;border-radius:3px}
.photo-wrap{display:flex;gap:16px;align-items:flex-start}
.photo-box{width:120px;height:150px;border:2px dashed var(--border);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;background:#fafbfc;transition:border-color .15s}
.photo-box:hover{border-color:var(--primary)}
.photo-box img{width:100%;height:100%;object-fit:cover}
.photo-box .ph-hint{font-size:10px;color:var(--muted);text-align:center;padding:8px}
.pdpa-item{border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.pdpa-item p{font-size:13px;line-height:1.6;margin-bottom:8px}
.pdpa-btns{display:flex;gap:8px}
.pdpa-btn{padding:4px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;background:#fff;transition:all .15s}
.pdpa-btn.yes.on{background:#e8f8f0;border-color:#27ae60;color:#1a7a4a;font-weight:600}
.pdpa-btn.no.on{background:#fdf0ee;border-color:var(--danger);color:var(--danger);font-weight:600}
.check-row{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);margin-top:14px;cursor:pointer}
.check-row input[type=checkbox]{margin-top:2px;flex-shrink:0;width:14px;height:14px}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.toolbar .doc-info{margin-left:auto;font-size:11px;color:var(--muted);font-family:monospace}
.btn{padding:8px 20px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s;background:#fff}
.btn:hover{filter:brightness(.96)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:#153f70}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-outline{background:#fff;color:var(--primary);border-color:var(--primary)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:default}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.nav-bar .step-info{font-size:12px;color:var(--muted)}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.alert-info{background:#e8f0fb;border:1px solid #b8d0f0;color:var(--primary)}
.alert-success{background:#e8f8f0;border:1px solid #86e0b0;color:var(--success)}
.alert-warn{background:#fef9ec;border:1px solid #f0c040;color:#7a5c00}
.success-screen{text-align:center;padding:48px 24px}
.success-icon{width:72px;height:72px;border-radius:50%;background:#e8f8f0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px}
/* ============ ATS DASHBOARD ============ */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);border-top:3px solid var(--border);cursor:pointer;transition:transform .1s}
.stat-card:hover{transform:translateY(-1px)}
.stat-card.on{outline:2px solid var(--primary)}
.stat-card .num{font-size:26px;font-weight:700;line-height:1.2}
.stat-card .lbl{font-size:11px;color:var(--muted)}
.stat-card.s-all{border-top-color:var(--primary)}.stat-card.s-all .num{color:var(--primary)}
.stat-card.s-new{border-top-color:#2980b9}.stat-card.s-new .num{color:#2980b9}
.stat-card.s-screen{border-top-color:var(--accent)}.stat-card.s-screen .num{color:var(--warn)}
.stat-card.s-intv{border-top-color:#8e44ad}.stat-card.s-intv .num{color:#8e44ad}
.stat-card.s-pass{border-top-color:var(--success)}.stat-card.s-pass .num{color:var(--success)}
.stat-card.s-fail{border-top-color:var(--danger)}.stat-card.s-fail .num{color:var(--danger)}
.ats-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.ats-table th{background:var(--primary);color:#fff;font-size:12px;font-weight:600;padding:9px 12px;text-align:left;white-space:nowrap}
.ats-table td{padding:8px 12px;border-bottom:1px solid #eef1f5;font-size:13px;vertical-align:middle}
.ats-table tr:hover td{background:#f6f9fd}
.ats-table .rec-no{font-family:monospace;font-size:11px;color:var(--primary);font-weight:600}
.status-pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.st-ใหม่{background:#e8f0fb;color:#2471a3}
.st-คัดกรอง{background:#fdf6e3;color:var(--warn)}
.st-นัดสัมภาษณ์{background:#f3e8fb;color:#8e44ad}
.st-ผ่าน{background:#e8f8f0;color:var(--success)}
.st-ไม่ผ่าน{background:#fdf0ee;color:var(--danger)}
.status-sel{padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:inherit}
.search-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none}
.search-bar input{flex:1;min-width:200px}
.empty-state{text-align:center;padding:48px;color:var(--muted);background:#fff;border:1px dashed var(--border);border-radius:var(--radius)}
.login-box{max-width:380px;margin:60px auto;background:#fff;border:1px solid var(--border);border-radius:8px;padding:32px;box-shadow:var(--shadow);text-align:center}
/* Home: job board */
.home-hero{background:linear-gradient(120deg,var(--primary) 0%,#2a6cb5 100%);color:#fff;border-radius:10px;padding:34px 28px;margin-bottom:22px;box-shadow:var(--shadow)}
.home-hero h1{font-size:24px;font-weight:700;margin-bottom:8px}
.home-hero p{font-size:13px;opacity:.9;line-height:1.7}
.job-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.job-card{background:#fff;border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:8px;padding:16px 18px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s}
.job-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.job-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:6px}
.job-meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:11.5px;color:var(--muted);margin-bottom:6px}
.job-qual{font-size:12px;color:var(--text);background:var(--bg);border-radius:5px;padding:7px 10px;line-height:1.6}
/* HR sidebar layout */
.hr-layout{display:flex;gap:18px;align-items:flex-start}
.sidebar{width:210px;flex-shrink:0;background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:420px;position:sticky;top:74px}
.side-user{display:flex;align-items:center;gap:10px;padding-bottom:12px;margin-bottom:10px;border-bottom:1px solid var(--border)}
.side-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.side-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text);margin-bottom:2px;transition:background .12s}
.side-item:hover{background:var(--bg)}
.side-item.on{background:var(--primary-light);color:var(--primary);font-weight:600}
/* Appointments */
.appt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
.appt-card{border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:#fafbfd}
.appt-card.set{background:#f3faf6;border-color:#a8dcc0}
.appt-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:var(--primary)}
.appt-body{font-size:12.5px;margin-top:8px;line-height:1.7}
/* Activity log */
.log-list{border-left:2px solid var(--primary-light);padding-left:14px;display:flex;flex-direction:column;gap:6px}
.log-item{font-size:12px;display:flex;gap:10px;flex-wrap:wrap}
.log-when{color:var(--muted);font-family:monospace;font-size:11px;white-space:nowrap}
.log-by{color:var(--primary);font-weight:600;white-space:nowrap}
/* Documents upload */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.doc-card{border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:#fafbfd}
.doc-card-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:var(--primary);margin-bottom:4px}
.doc-chip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;margin-bottom:6px;text-decoration:none;color:var(--text)}
.doc-chip.link:hover{border-color:var(--primary);background:var(--primary-light)}
.doc-chip-icon{flex-shrink:0}
.doc-chip-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.doc-chip-size{color:var(--muted);font-size:10px;white-space:nowrap}
.doc-chip-x{color:var(--danger);cursor:pointer;font-weight:700;padding:0 4px}
.doc-add{display:block;text-align:center;border:1.5px dashed var(--border);border-radius:6px;padding:8px;font-size:12px;color:var(--primary);cursor:pointer;transition:all .15s;background:#fff}
.doc-add:hover{border-color:var(--primary);background:var(--primary-light)}
/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translate(-50%,12px);background:#1e2a3a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.3);opacity:0;transition:all .25s;z-index:999;max-width:90vw}
.toast.show{opacity:1;transform:translate(-50%,0)}
.otp-box{margin-top:14px;border:1px solid var(--border);border-radius:8px;padding:14px;background:#f7f9fc}
.otp-box.ok{background:#f3faf6;border-color:#a8dcc0}
/* Reports Center */
.report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:16px}
.report-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px 20px;text-align:center;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;transition:transform .12s,box-shadow .12s}
.report-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.1)}
.rc-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px}
.rc-icon-blue{background:#e8f0fb}.rc-icon-green{background:#e8f8f0}.rc-icon-amber{background:#fef6e0}.rc-icon-purple{background:#f3e8fb}.rc-icon-dark{background:#e9ecf1}
.rc-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px}
.rc-desc{font-size:12px;color:var(--muted);line-height:1.6;flex:1;margin-bottom:16px}
.rc-btn{width:100%;padding:10px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:#fff;transition:filter .12s}
.rc-btn:hover{filter:brightness(.93)}
.rc-btn-blue{background:#2563eb}.rc-btn-green{background:#1a9a5a}.rc-btn-amber{background:#e0a020}.rc-btn-purple{background:#8e44ad}.rc-btn-dark{background:#1e2a3a}
.report-filter{display:flex;gap:12px;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
.report-filter label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.report-filter select,.report-filter input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px}
.report-head-print{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--primary-light)}
.stat-summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.stat-box{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-box-num{font-size:28px;font-weight:700;color:var(--primary)}
.stat-box-lbl{font-size:12px;color:var(--muted);margin-top:4px}
.stat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stat-bar-label{width:90px;font-size:12px;flex-shrink:0}
.stat-bar-track{flex:1;height:18px;background:#eef1f5;border-radius:9px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:9px;background:var(--primary);transition:width .3s}
.st-fill-ใหม่{background:#2980b9}.st-fill-คัดกรอง{background:#b07d10}.st-fill-นัดสัมภาษณ์{background:#8e44ad}.st-fill-ผ่าน{background:#1a7a4a}.st-fill-ไม่ผ่าน{background:#c0392b}
.stat-bar-val{width:80px;font-size:12px;text-align:right;flex-shrink:0;color:var(--muted)}
@media print{
  .report-print-wrap{padding:10mm}
  .report-print-wrap .ats-table{font-size:10pt}
  .report-print-wrap .ats-table th{background:#1a4f8a!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.settings-tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:2px solid var(--border)}
.settings-tab{padding:8px 14px;font-size:13px;cursor:pointer;border-radius:6px 6px 0 0;color:var(--muted);border:1px solid transparent;border-bottom:none;margin-bottom:-2px}
.settings-tab:hover{background:var(--bg)}
.settings-tab.on{color:var(--primary);font-weight:600;background:#fff;border-color:var(--border);border-bottom:2px solid #fff}
code{background:#eef2f7;padding:1px 5px;border-radius:3px;font-size:11px;color:var(--primary)}
.detail-grid{display:grid;grid-template-columns:140px 1fr;gap:4px 14px;font-size:13px}
.detail-grid dt{color:var(--muted)}
.detail-grid dd{font-weight:500}
.note-area{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:13px;min-height:54px;resize:vertical}
.mode-tag{font-size:10px;padding:2px 8px;border-radius:3px;background:#fef9ec;color:#7a5c00;border:1px solid #f0c040;margin-left:8px}
/* ============ PRINT DOCUMENT (AKR-OHR-FM-001 replica) ============ */
#printArea{display:none}
.pp{width:210mm;min-height:296mm;background:#fff;margin:0 auto 10mm;padding:10mm 12mm 8mm;display:flex;flex-direction:column;position:relative;font-size:9.5pt;line-height:1.45;color:#000}
.pp-head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2.5pt solid #1a4f8a;padding-bottom:2mm;margin-bottom:3mm}
.pp-head img{height:11mm}
.pp-head .mine{color:#555;font-size:8pt}
.pp-title{background:#1a4f8a;color:#fff;text-align:center;font-weight:700;font-size:12pt;padding:1.6mm 0}
.pp-commit{background:#1a4f8a;color:#fff;font-size:7pt;text-align:center;padding:1mm 3mm;line-height:1.4}
.pp-sec{background:#1a4f8a;color:#fff;font-weight:700;padding:1mm 3mm;margin-top:2.5mm;font-size:9.5pt}
.pp table{width:100%;border-collapse:collapse}
.pp td,.pp th{border:.5pt solid #000;padding:1mm 2mm;vertical-align:top;font-size:9pt}
.pp .lb{background:#e8f0fa;font-size:7.5pt;line-height:1.3}
.pp .ck{font-size:11pt;line-height:1}
.pp .sm{font-size:7.5pt}
.pp-photo{border:.5pt solid #000;width:28mm;height:36mm;display:flex;align-items:center;justify-content:center;font-size:7pt;color:#888;overflow:hidden}
.pp-photo img{width:100%;height:100%;object-fit:cover}
/* ISO footer — bottom of EVERY page */
.pp-footer{margin-top:auto;border-top:.5pt solid #888;padding-top:1.5mm;display:flex;justify-content:space-between;font-size:7.5pt;color:#444;font-family:'Sarabun',Tahoma,sans-serif}
.pp-footer b{font-family:monospace;letter-spacing:.3px}
@media print{
  body{background:#fff}
  body.printing .app-shell{display:none!important}
  body.printing #printArea{display:block}
  .pp{margin:0;box-shadow:none;page-break-after:always;min-height:0;height:277mm;overflow:hidden}
  .pp:last-child{page-break-after:auto}
  @page{size:A4;margin:10mm 0}
}
/* Print preview on screen */
body.preview-mode #printArea{display:block;background:#9aa5b1;padding:10mm 0}
body.preview-mode .pp{box-shadow:0 2px 12px rgba(0,0,0,.3)}
@media(max-width:640px){
  .g2,.g3,.g4{grid-template-columns:1fr!important}
  .toolbar{gap:6px}
  .btn{padding:7px 12px;font-size:12px}
  .detail-grid{grid-template-columns:1fr}
  .hr-layout{flex-direction:column}
  .sidebar{width:100%;position:static;min-height:0}
  .job-grid{grid-template-columns:1fr}
}
</style>

// ─── Helpers ──────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s===undefined||s===null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function val(s){ return (s===undefined||s===null||s==='') ? '' : esc(s); }
function todayTH(){ return new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'}); }
function dateTH(iso){
  if(!iso) return '';
  var d = new Date(iso);
  if(isNaN(d)) return esc(iso);
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+(d.getFullYear()+543);
}
function monthTH(ym){
  if(!ym) return '';
  var p = String(ym).split('-');
  if(p.length<2) return esc(ym);
  return p[1]+'/'+(parseInt(p[0],10)+543);
}
function milLabel(v){
  var o = MIL_OPTS.filter(function(m){return m.v===v;})[0];
  return o ? o.l : '';
}
function showErr(id,msg){ var e=$('err_'+id); if(e){e.textContent=msg;} var i=$(id); if(i){i.classList.add('err');} }
function clearErr(id){ var e=$('err_'+id); if(e){e.textContent='';} var i=$(id); if(i){i.classList.remove('err');} }

// ─── Data layer: GAS API หรือ localStorage (demo) ─────────────────────
function isDemo(){ return !CONFIG.API_URL; }
function lsLoad(){ try{ return JSON.parse(localStorage.getItem('akr_ats')||'[]'); }catch(e){ return []; } }
function lsSave(arr){ localStorage.setItem('akr_ats', JSON.stringify(arr)); }
function nextRecNo(arr){
  var yearBE = new Date().getFullYear() + 543;
  var prefix = 'REC-' + yearBE + '-';
  var max = 0;
  arr.forEach(function(r){
    if(r.id && r.id.indexOf(prefix)===0){
      var n = parseInt(r.id.slice(prefix.length),10);
      if(n>max) max=n;
    }
  });
  return prefix + ('0000'+(max+1)).slice(-4);
}
// shared POST: แนบ token + sid อัตโนมัติ
function apiPost(payload){
  payload.token = CONFIG.API_TOKEN;
  if(session && session.sid) payload.sid = session.sid;
  return fetch(CONFIG.API_URL, {
    method:'POST',
    redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  }).then(parseApiResponse_).catch(function(err){ throw netError_(err); });
}
function apiGet(qs){
  return fetch(CONFIG.API_URL + '?' + qs, { method:'GET', redirect:'follow' })
    .then(parseApiResponse_).catch(function(err){ throw netError_(err); });
}
function parseApiResponse_(r){
  return r.text().then(function(t){
    try { return JSON.parse(t); }
    catch(e){
      if(t.indexOf('<')===0 || /sign in|authoriz|accounts\.google/i.test(t)){
        throw new Error('เซิร์ฟเวอร์ตอบกลับเป็นหน้าเว็บ ไม่ใช่ข้อมูล — ตรวจว่า Deploy ตั้ง "Who has access" เป็น Anyone และใช้ URL ที่ลงท้าย /exec');
      }
      throw new Error('รูปแบบข้อมูลจากเซิร์ฟเวอร์ไม่ถูกต้อง');
    }
  });
}
function netError_(err){
  var msg = String(err && err.message || err);
  if(/failed to fetch|networkerror|load failed|typeerror/i.test(msg)){
    return new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ — ตรวจ: (1) URL ใน CONFIG.API_URL ถูกต้องและลงท้าย /exec (2) Deploy เป็น Web app สิทธิ์ Anyone (3) ปิดส่วนขยายเบราว์เซอร์/ad-blocker แล้วลองใหม่ (4) อินเทอร์เน็ต');
  }
  return err instanceof Error ? err : new Error(msg);
}
function handleSessionError(res){
  if(res && (res.error==='session_expired')){
    session=null; hrAuthed=false; localStorage.removeItem('akr_hr_session');
    alert('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');
    view='login'; render();
    return true;
  }
  return false;
}
// ── OTP ──
function apiRequestOtp(email){
  if(isDemo()){ otpState._demoCode='123456'; return Promise.resolve({ok:true, demo:true}); }
  return apiPost({action:'requestOtp', email:email});
}
function apiCheckDuplicate(idCard, email){
  if(isDemo()){
    var dup = lsLoad().filter(function(r){
      var d=r.data||{};
      return (d.idCard && d.idCard.replace(/\D/g,'')===String(idCard).replace(/\D/g,'')) ||
             (d.email && d.email.toLowerCase()===String(email).toLowerCase());
    })[0];
    return Promise.resolve({ok:true, duplicate: dup?dup.id:''});
  }
  return apiPost({action:'checkDuplicate', idCard:idCard, email:email});
}
function apiSubmit(record, otp){
  if(isDemo()){
    var arr = lsLoad();
    record.id = nextRecNo(arr);
    if(record.data && record.data.docs){
      record.data.docs = record.data.docs.map(function(x){
        return { type:x.type, name:x.name, mime:x.mime, size:x.size, demo:true };
      });
    }
    arr.unshift(record);
    try { lsSave(arr); }
    catch(e){ arr.shift(); throw new Error('พื้นที่จัดเก็บของเบราว์เซอร์เต็ม (โหมดทดลอง)'); }
    return Promise.resolve(record);
  }
  return apiPost({action:'submit', record:record, otp:otp}).then(function(res){
    if(!res.ok){ var e=new Error(res.message||res.error||'submit failed'); e.code=res.error; throw e; }
    record.id = res.id;
    return record;
  });
}
function apiList(){
  if(isDemo()){ return Promise.resolve(lsLoad()); }
  return apiPost({action:'list'})
    .then(function(res){ if(!res.ok){ handleSessionError(res); throw new Error(mapErr_(res)); } return res.records; });
}
function mapErr_(res){
  var e = res.error||'';
  if(e==='session_expired') return 'session_expired';
  if(e==='unauthorized') return 'token ไม่ตรงกับ Script Properties (API_TOKEN)';
  return res.message || e || 'failed';
}

// fields: {status, note, appts, logEntry}
function apiUpdate(id, fields){
  if(isDemo()){
    var arr = lsLoad();
    arr.forEach(function(r){
      if(r.id===id){
        if(fields.status!==undefined) r.status=fields.status;
        if(fields.note!==undefined) r.note=fields.note;
        if(fields.appts!==undefined) r.appts=fields.appts;
        if(fields.logEntry){ r.log = r.log||[]; r.log.push(fields.logEntry); }
      }
    });
    lsSave(arr);
    return Promise.resolve(true);
  }
  return apiPost({action:'update', id:id, fields:fields}).then(function(res){
    if(!res.ok){ handleSessionError(res); throw new Error(res.error||'update failed'); }
    return true;
  });
}

function jobsLoadLS(){ try{ return JSON.parse(localStorage.getItem('akr_ats_jobs')||'[]'); }catch(e){ return []; } }
function jobsSaveLS(arr){ localStorage.setItem('akr_ats_jobs', JSON.stringify(arr)); }
function nextJobNo(arr){
  var max=0;
  arr.forEach(function(j){
    var n=parseInt(String(j.id||'').replace('JOB-',''),10);
    if(n>max) max=n;
  });
  return 'JOB-'+('000'+(max+1)).slice(-3);
}
function apiJobs(){
  if(isDemo()){ return Promise.resolve(jobsLoadLS()); }
  return apiPost({action:'jobs'})
    .then(function(res){ if(!res.ok) throw new Error(mapErr_(res)); return res.jobs; });
}
function apiSaveJob(job){
  if(isDemo()){
    var arr = jobsLoadLS();
    if(!job.id){ job.id = nextJobNo(arr); arr.unshift(job); }
    else {
      var found=false;
      arr = arr.map(function(j){ if(j.id===job.id){found=true;return job;} return j; });
      if(!found) arr.unshift(job);
    }
    jobsSaveLS(arr);
    return Promise.resolve(job);
  }
  return apiPost({action:'saveJob', job:job}).then(function(res){
    if(!res.ok){ handleSessionError(res); throw new Error(res.error||'save job failed'); }
    job.id = res.id || job.id;
    return job;
  });
}
function apiDeleteJob(id){
  if(isDemo()){
    jobsSaveLS(jobsLoadLS().filter(function(j){return j.id!==id;}));
    return Promise.resolve(true);
  }
  return apiPost({action:'deleteJob', id:id}).then(function(res){
    if(!res.ok){ handleSessionError(res); throw new Error(res.error||'delete job failed'); }
    return true;
  });
}

function fmtSize(b){
  if(b>=1048576) return (b/1048576).toFixed(1)+' MB';

}

  return '<div class="card"><div class="card-header"><div class="icon">📎</div><h2>เอกสารประกอบการสมัคร <small>Supporting Documents</small></h2></div>'

    + '<div class="doc-grid">'+cards+'</div>'

}
function handleDocFile(typeKey, inp){
  var f = inp.files[0];
  inp.value='';
  if(!f) return;
  var okTypes = ['application/pdf','image/jpeg','image/png'];
  if(okTypes.indexOf(f.type)===-1){ alert('รองรับเฉพาะไฟล์ PDF, JPG, PNG'); return; }
  if(f.size > DOC_MAX_FILE){ alert('ไฟล์ใหญ่เกิน '+(DOC_MAX_FILE/1048576)+' MB\nกรุณาย่อไฟล์หรือสแกนความละเอียดต่ำลง'); return; }
  var finish = function(dataURL, size){
    if(docsTotal() + size > DOC_MAX_TOTAL){ alert('ขนาดไฟล์รวมเกิน '+(DOC_MAX_TOTAL/1048576)+' MB กรุณาลบบางไฟล์ก่อน'); return; }
    F.docs.push({ type:typeKey, name:f.name, mime:(dataURL.indexOf('image/jpeg')>-1&&f.type!=='application/pdf')?'image/jpeg':f.type, size:size, dataURL:dataURL });
    render();
  };
  if(f.type==='application/pdf'){
    var r = new FileReader();
    r.onload = function(e){ finish(e.target.result, f.size); };
    r.readAsDataURL(f);
  } else {
    // รูปภาพ: ย่อขนาดเพื่อประหยัดพื้นที่และเวลาอัปโหลด
    var rd = new FileReader();
    rd.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var maxW = 1600;
        var sc = Math.min(1, maxW/img.width);
        var cv = document.createElement('canvas');
        cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        var out = cv.toDataURL('image/jpeg',0.8);
        var size = Math.round((out.length - out.indexOf(',') - 1) * 3/4);
        finish(out, size);
      };
      img.src = e.target.result;
    };
    rd.readAsDataURL(f);
  }
}

function validate(){
  var ok = true;
  if(cur===0){
    if(!F.pos1){showErr('pos1','กรุณาระบุตำแหน่ง');ok=false;}
    if(!F.salary){showErr('salary','กรุณาระบุเงินเดือนที่คาดหวัง');ok=false;}
  }
  if(cur===1){
    if(!F.firstName){showErr('firstName','กรุณากรอกชื่อ');ok=false;}
    if(!F.lastName){showErr('lastName','กรุณากรอกนามสกุล');ok=false;}
    // ต้องมีช่องทางติดต่ออย่างน้อยหนึ่ง: เบอร์โทร หรือ อีเมล
    if(!F.phone && !F.email){
      showErr('phone','กรุณากรอกเบอร์โทร หรืออีเมล อย่างน้อยหนึ่งอย่าง');
      showErr('email','กรุณากรอกอีเมล หรือเบอร์โทร อย่างน้อยหนึ่งอย่าง');
      ok=false;
    }
    if(F.email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(F.email.trim())){showErr('email','รูปแบบอีเมลไม่ถูกต้อง');ok=false;}
    if(!F.idCard){showErr('idCard','กรุณากรอกเลขบัตร');ok=false;}
    else if(!/^\d[-\s]?\d{4}[-\s]?\d{5}[-\s]?\d{2}[-\s]?\d$/.test(F.idCard.trim())){showErr('idCard','รูปแบบเลขบัตรไม่ถูกต้อง (13 หลัก)');ok=false;}
  }
  if(cur===STEPS.length-1){
    if(!F.agreed){showErr('agreed','กรุณายืนยันความถูกต้องของข้อมูล');ok=false;}
    // OTP บังคับเฉพาะเมื่อกรอกอีเมล — ไม่มีอีเมลก็ส่งได้ (HR ยืนยันทางโทรศัพท์)
    if(!isDemo() && F.email && !(otpState.verified && otpState.email===F.email)){
      alert('กรุณายืนยันอีเมลด้วยรหัส OTP ก่อนส่งใบสมัคร\n(หากไม่ต้องการใช้อีเมล สามารถลบอีเมลออกแล้วใช้เบอร์โทรแทนได้)');
      ok=false;
    }
  }
  return ok;
}

    if(bn){bn.disabled=false;bn.textContent='ถัดไป →';}
    if(res.ok && res.duplicate){
      if(!confirm('พบใบสมัครที่ใช้เลขบัตรหรืออีเมลนี้แล้วในระบบ (เลขรับ '+res.duplicate+')\n\nหากต้องการอัปเดตข้อมูล กรุณาติดต่อฝ่าย HR โดยตรง\n\nกด OK เพื่อดำเนินการต่อ (ระบบจะปฏิเสธการส่งซ้ำ) หรือ Cancel เพื่อกลับไปแก้ไข')){
        return;
      }
    }
    doNext();
  }).catch(function(){
    if(bn){bn.disabled=false;bn.textContent='ถัดไป →';}
    doNext();  // ถ้าตรวจไม่ได้ ปล่อยผ่าน (server จะกันซ้ำอีกชั้นตอน submit)
  });
}
function doNext(){
  if(cur < STEPS.length-1){ cur++; render(); window.scrollTo(0,0); }
  else submitForm();
}
function nextStep(){
  if(!validate()) return;
  if(cur===1){ checkDupThenNext(); return; }   // หลังกรอกข้อมูลส่วนตัว → ตรวจสมัครซ้ำ
  doNext();
}
function prevStep(){ if(cur>0){ cur--; render(); window.scrollTo(0,0); } }
function goStep(i){ if(i<cur){ cur=i; render(); window.scrollTo(0,0); } }
function submitForm(){
  if(!validate()) return;
  var bn=$('btnNext'); if(bn){bn.disabled=true;bn.textContent='กำลังส่ง...';}
  var record = {
    id:'', ts: new Date().toISOString(), status:'ใหม่', note:'',
    appts:{}, log:[],
    emailVerified: !!(F.email && otpState.verified && otpState.email===F.email),
    data: JSON.parse(JSON.stringify(F)), photo: photoDataURL
  };
  apiSubmit(record, otpState.code).then(function(rec){
    lastSubmitted = rec;
    otpState = { sent:false, verified:false, sending:false, email:'' };
    view='success'; render(); window.scrollTo(0,0);
  }).catch(function(err){
    if(bn){bn.disabled=false;bn.textContent='✓ ส่งใบสมัคร';}
    if(err.code==='duplicate'){ alert(err.message); }
    else if(err.code==='otp_invalid'){ otpState.verified=false; alert('รหัส OTP ไม่ถูกต้องหรือหมดอายุ กรุณาขอรหัสใหม่'); render(); }
    else { alert('ส่งใบสมัครไม่สำเร็จ: '+err.message+'\nกรุณาลองใหม่อีกครั้ง'); }
  });
}

// ─── HR mode ──────────────────────────────────────────────────────────
function toggleHR(){
  if(view==='dashboard'||view==='detail'||view==='login'){ view='home'; loadHome(); return; }
  view = hrAuthed ? 'dashboard' : 'login';
  if(view==='dashboard') loadDashboard(); else render();
}
function tryLogin(){
  var u=$('hrUser'), p=$('hrPass');
  if(!u||!p) return;
  var btn=$('loginBtn'); if(btn){btn.disabled=true;btn.textContent='กำลังเข้าสู่ระบบ...';}
  var remember = $('chkRemember') && $('chkRemember').checked;
  apiHrLogin(u.value, p.value).then(function(res){
    if(res.ok){
      session = { user:res.user, name:res.name, sid:res.sid, role:res.role||'hr' };
      if(remember) localStorage.setItem('akr_hr_session', JSON.stringify(session));
      hrAuthed = true;
      loadDashboard();
    } else {
      var e=$('loginErr'); if(e) e.textContent = res.error==='bad_credentials' ? 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง' : ('เข้าสู่ระบบไม่สำเร็จ: '+(res.error||''));
      if(btn){btn.disabled=false;btn.textContent='เข้าสู่ระบบ';}
    }
  }).catch(function(err){
    var e=$('loginErr'); if(e) e.textContent='เชื่อมต่อระบบไม่สำเร็จ: '+err.message;
    if(btn){btn.disabled=false;btn.textContent='เข้าสู่ระบบ';}
  });
}
function logout(){
  if(!confirm('ลงชื่อออกจากระบบ HR?')) return;
  session=null; hrAuthed=false;
  localStorage.removeItem('akr_hr_session');
  view='home'; loadHome();
}
function loadDashboard(){
  view='dashboard'; render();
  var settle = function(p){ return p.then(function(v){return {ok:true,v:v};}, function(e){return {ok:false,e:e};}); };
  Promise.all([ settle(apiList()), settle(apiJobs()), settle(apiSettings()) ]).then(function(res){
    var errs = [];
    if(res[0].ok) records = res[0].v||[]; else errs.push('• รายชื่อผู้สมัคร: '+errMsg_(res[0].e));
    if(res[1].ok) jobs = res[1].v||[];    else errs.push('• ตำแหน่งงาน: '+errMsg_(res[1].e));
    if(res[2].ok && res[2].v && res[2].v.settings){
      settings = res[2].v.settings; hrUsersList = res[2].v.hrUsers||[];
      if(res[2].v.myRole && session){ session.role = res[2].v.myRole; }
    }
    else if(!res[2].ok) errs.push('• ตั้งค่า: '+errMsg_(res[2].e));
    render();
    if(errs.length){
      // ถ้ามี session หมดอายุ → เด้งไป login
      for(var i=0;i<res.length;i++){
        if(!res[i].ok && /session/i.test(errMsg_(res[i].e))){
          session=null; hrAuthed=false; localStorage.removeItem('akr_hr_session');
          alert('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่'); view='login'; render(); return;
        }
      }
      alert('โหลดข้อมูลบางส่วนไม่สำเร็จ:\n\n'+errs.join('\n')+'\n\nกดปุ่ม "รีเฟรช" เพื่อลองใหม่ หรือใช้เครื่องมือตรวจการเชื่อมต่อ');
    }
  });
}
function errMsg_(e){ return (e && e.message) ? e.message : String(e); }
function loadHome(){
  view='home'; render();
  apiJobs().then(function(arr){ jobs=arr||[]; if(view==='home') render(); })
    .catch(function(){ jobs=[]; if(view==='home') render(); });
}
function setFilter(s){ filterStatus = (filterStatus===s)?'':s; render(); }
function filteredRecords(){
  var q = searchText.trim().toLowerCase();
  return records.filter(function(r){
    if(filterStatus && r.status!==filterStatus) return false;
    if(!q) return true;
    var d=r.data||{};
    var hay = [r.id, d.firstName, d.lastName, d.pos1, d.pos2, d.pos3, d.phone, d.email].join(' ').toLowerCase();
    return hay.indexOf(q)>-1;
  });
}
function changeStatus(id, st, selEl){
  var rec = records.filter(function(r){return r.id===id;})[0];
  var old = rec ? rec.status : '?';
  if(st===old) return;
  var nm = rec && rec.data ? (rec.data.firstName+' '+rec.data.lastName) : id;
  if(!confirm('ยืนยันเปลี่ยนสถานะของ "'+nm+'"\n\n  '+old+'  →  '+st+'\n\nผู้ดำเนินการ: '+((session&&session.name)||'-'))){
    if(selEl) selEl.value = old;   // ยกเลิก → คืนค่าเดิม
    return;
  }
  var entry = logEntry('เปลี่ยนสถานะ '+old+' → '+st);
  apiUpdate(id, {status:st, logEntry:entry}).then(function(){
    records.forEach(function(r){
      if(r.id===id){ r.status=st; r.log=r.log||[]; r.log.push(entry); }
    });
    if(currentRec && currentRec.id===id){ currentRec.status=st; }
    toast('เปลี่ยนสถานะเป็น "'+st+'" แล้ว — บันทึกโดย '+((session&&session.name)||'-'));
    render();
  }).catch(function(err){
    if(selEl) selEl.value = old;
    alert('อัปเดตไม่สำเร็จ: '+err.message);
  });
}
function openDetail(id){
  currentRec = records.filter(function(r){return r.id===id;})[0] || null;
  if(currentRec){ view='detail'; render(); window.scrollTo(0,0); }
}
function saveNote(){
  if(!currentRec) return;
  var n=$('noteArea'); if(!n) return;
  var entry = logEntry('บันทึกข้อความ HR');
  apiUpdate(currentRec.id, {note:n.value, logEntry:entry}).then(function(){
    currentRec.note = n.value;
    currentRec.log = currentRec.log||[]; currentRec.log.push(entry);
    toast('บันทึกแล้ว — โดย '+((session&&session.name)||'-'));
  }).catch(function(err){ alert('บันทึกไม่สำเร็จ: '+err.message); });
}
function saveAppt(typeKey){
  if(!currentRec) return;
  var t = APPT_TYPES.filter(function(a){return a.k===typeKey;})[0];
  var dEl=$('appt_'+typeKey+'_date'), tmEl=$('appt_'+typeKey+'_time'), plEl=$('appt_'+typeKey+'_place'), ntEl=$('appt_'+typeKey+'_note');
  // health: place มาจาก dropdown โรงพยาบาล
  var place = plEl?plEl.value:'';
  if(typeKey==='health'){
    var hsel=$('appt_health_hospital');
    if(hsel && hsel.value) place = hsel.value;
  }
  if(!dEl || !dEl.value){ alert('กรุณาระบุวันที่นัดหมาย'); return; }
  currentRec.appts = currentRec.appts || {};
  var apptData = {
    date: dEl.value, time: tmEl?tmEl.value:'', place: place, note: ntEl?ntEl.value:'',
    by: (session&&session.name)||'-', savedAt: new Date().toISOString(), notified:false
  };
  // ใบส่งตัวตรวจสุขภาพ: เก็บข้อมูลเพิ่มสำหรับยื่นโรงพยาบาล
  if(typeKey==='health'){
    apptData.dept = ($('appt_health_dept')||{}).value || '';
    apptData.section = ($('appt_health_section')||{}).value || '';
    apptData.position = ($('appt_health_position')||{}).value || '';
    apptData.plan = ($('appt_health_plan')||{}).value || '';
  }
  currentRec.appts[typeKey] = apptData;
  if(currentRec._editAppt) currentRec._editAppt[typeKey] = false;
  var entry = logEntry(t.l+' → '+dateTH(dEl.value)+(tmEl&&tmEl.value?' '+tmEl.value+' น.':''));
  apiUpdate(currentRec.id, {appts:currentRec.appts, logEntry:entry}).then(function(){
    currentRec.log = currentRec.log||[]; currentRec.log.push(entry);
    records.forEach(function(r){ if(r.id===currentRec.id){ r.appts=currentRec.appts; r.log=currentRec.log; } });
    toast('บันทึก'+t.l+'แล้ว');
    // เสนอส่งอีเมลแจ้งผู้สมัครทันที (ถ้ามีอีเมล)
    var d = currentRec.data||{};
    if(d.email){
      if(confirm('บันทึกนัดหมายแล้ว\n\nต้องการส่งอีเมลแจ้ง '+t.l+' ถึงผู้สมัคร ('+d.email+') เลยหรือไม่?')){
        sendApptEmail(typeKey);
        return;
      }
    }
    render();
  }).catch(function(err){ alert('บันทึกนัดหมายไม่สำเร็จ: '+err.message); });
}
function sendApptEmail(typeKey){
  if(!currentRec) return;
  var t = APPT_TYPES.filter(function(a){return a.k===typeKey;})[0];
  var ap = (currentRec.appts||{})[typeKey];
  if(!ap){ alert('ยังไม่มีข้อมูลนัดหมาย'); return; }
  var d = currentRec.data||{};
  if(!d.email){ alert('ผู้สมัครไม่มีอีเมล — ใช้ปุ่ม "พิมพ์ใบนัด" เพื่อส่งทาง LINE หรือมอบให้ผู้สมัครแทน'); return; }
  var applicant = { name:(d.firstName||'')+' '+(d.lastName||''), email:d.email, position:d.pos1||'' };
  var appt = { date:ap.date, dateTH:dateTH(ap.date), time:ap.time, place:ap.place, note:ap.note };
  apiNotifyAppt(applicant, typeKey, appt).then(function(res){
    if(res.sent){
      ap.notified = true;
      var entry = logEntry('ส่งอีเมลแจ้ง'+t.l+'ถึงผู้สมัคร');
      apiUpdate(currentRec.id, {appts:currentRec.appts, logEntry:entry}).then(function(){
        currentRec.log=currentRec.log||[]; currentRec.log.push(entry);
        toast('ส่งอีเมลแจ้งผู้สมัครแล้ว'); render();
      });
    } else { alert('ส่งอีเมลไม่สำเร็จ — ผู้สมัครอาจไม่มีอีเมล'); render(); }
  }).catch(function(err){ alert('ส่งอีเมลไม่สำเร็จ: '+err.message); });
}
function clearAppt(typeKey){
  if(!currentRec || !currentRec.appts || !currentRec.appts[typeKey]) return;
  if(!confirm('ลบนัดหมายนี้?')) return;
  delete currentRec.appts[typeKey];
  var entry = logEntry('ยกเลิก'+(APPT_TYPES.filter(function(a){return a.k===typeKey;})[0]||{}).l);
  apiUpdate(currentRec.id, {appts:currentRec.appts, logEntry:entry}).then(function(){
    currentRec.log = currentRec.log||[]; currentRec.log.push(entry);
    render();
  }).catch(function(err){ alert('ลบไม่สำเร็จ: '+err.message); });
}

function editJob(id){

                  : { id:'', title:'', dept:'', location:'Chatree Gold Mine, พิจิตร', type:'พนักงานประจำ', openings:1, status:'เปิดรับ', posted:new Date().toISOString(), by:(session&&session.name)||'-' };

function cancelEditJob(){ editingJob=null; render(); }
function saveJob(){
  var t=$('jb_title'); if(!t||!t.value.trim()){ alert('กรุณาระบุชื่อตำแหน่ง'); return; }
  editingJob.title = t.value.trim();
  editingJob.dept = $('jb_dept') ? $('jb_dept').value.trim() : '';
  editingJob.location = $('jb_loc') ? $('jb_loc').value.trim() : '';
  editingJob.type = $('jb_type') ? $('jb_type').value : 'พนักงานประจำ';
  editingJob.openings = parseInt($('jb_open') ? $('jb_open').value : '1',10) || 1;
  editingJob.status = $('jb_status') ? $('jb_status').value : 'เปิดรับ';
  editingJob.qual = $('jb_qual') ? $('jb_qual').value.trim() : '';
  if(!editingJob.posted) editingJob.posted = new Date().toISOString();
  editingJob.by = (session&&session.name) || editingJob.by || '-';
  apiSaveJob(editingJob).then(function(saved){
    var found=false;
    jobs = jobs.map(function(j){ if(j.id===saved.id){found=true;return saved;} return j; });
    if(!found) jobs.unshift(saved);
    editingJob=null;
    toast('บันทึกตำแหน่งงานแล้ว');
    render();
  }).catch(function(err){ alert('บันทึกไม่สำเร็จ: '+err.message); });
}
function deleteJob(id){
  var j = jobs.filter(function(x){return x.id===id;})[0];
  if(!confirm('ลบตำแหน่ง "'+(j?j.title:id)+'" ออกจากประกาศรับสมัคร?')) return;
  apiDeleteJob(id).then(function(){
    jobs = jobs.filter(function(x){return x.id!==id;});
    render();
  }).catch(function(err){ alert('ลบไม่สำเร็จ: '+err.message); });
}

function toast(msg){
  var t = document.createElement('div');
  t.className='toast'; t.textContent='✓ '+msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.classList.add('show'); }, 10);
  setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); },300); }, 2600);
}

// ── 3. สรุปการนัดหมายที่จะถึงกำหนด ──
function reportAppointments(){
  var today = new Date().toISOString().slice(0,10);
  var items = [];
  records.forEach(function(r){
    var a=r.appts||{};
    APPT_TYPES.forEach(function(t){
      if(a[t.k] && a[t.k].date){
        items.push({ rec:r, type:t, appt:a[t.k], upcoming:a[t.k].date>=today });
      }
    });
  });
  items.sort(function(x,y){ return (x.appt.date+(x.appt.time||'')) < (y.appt.date+(y.appt.time||'')) ? -1 : 1; });
  var upcoming = items.filter(function(x){return x.upcoming;});
  var past = items.filter(function(x){return !x.upcoming;});
  var rowsOf = function(arr){
    return arr.map(function(x){
      var d=x.rec.data||{};
      return '<tr><td>'+x.type.icon+' '+x.type.l+'</td>'
        + '<td><strong>'+dateTH(x.appt.date)+'</strong>'+(x.appt.time?' '+esc(x.appt.time)+' น.':'')+'</td>'
        + '<td>'+esc(d.firstName)+' '+esc(d.lastName)+'</td>'
        + '<td>'+esc(d.pos1||'-')+'</td>'
        + '<td>'+esc(x.appt.place||'-')+'</td>'
        + '<td>'+esc(d.phone||d.email||'-')+'</td>'
        + '<td>'+(x.appt.notified?'<span class="status-pill st-ผ่าน">แจ้งแล้ว</span>':'<span class="status-pill st-คัดกรอง">ยังไม่แจ้ง</span>')+'</td></tr>';
    }).join('');
  };
  var section = function(title, arr){
    if(!arr.length) return '';
    return '<div class="report-head-print" style="margin-top:10px">'+title+' ('+arr.length+')</div>'
      + '<table class="ats-table"><thead><tr><th>ประเภท</th><th>วันเวลา</th><th>ผู้สมัคร</th><th>ตำแหน่ง</th><th>สถานที่</th><th>ติดต่อ</th><th>การแจ้ง</th></tr></thead><tbody>'+rowsOf(arr)+'</tbody></table>';
  };
  var body = (upcoming.length||past.length)
    ? section('🔔 นัดหมายที่จะถึงกำหนด', upcoming) + section('ผ่านมาแล้ว', past)
    : '<div class="empty-state">ยังไม่มีการนัดหมาย</div>';
  return '<div class="toolbar">'+reportBack()+'<h2 style="font-size:16px;color:var(--primary);margin-left:8px">📅 สรุปการนัดหมายที่จะถึงกำหนด</h2>'
    + '<div style="margin-left:auto"><button class="btn btn-sm btn-primary" onclick="printReport(\'สรุปการนัดหมาย\')">🖨 พิมพ์</button></div></div>'
    + '<div id="reportPrintArea"><div class="report-head-print">สรุปการนัดหมาย — '+esc((settings&&settings.company&&settings.company.name)||'Akara Resources')+'<br><span style="font-size:11px;font-weight:400">พิมพ์เมื่อ '+dateTH(new Date().toISOString())+'</span></div>'
    + body + '</div>';
}
// ── 4. รายงานภาพรวม / สถิติ ──
function reportStats(){
  var total = records.length;
  var byStatus = {}; curStages().forEach(function(s){ byStatus[s]=0; });
  records.forEach(function(r){ if(byStatus[r.status]!==undefined) byStatus[r.status]++; else byStatus[r.status]=(byStatus[r.status]||0)+1; });
  var withEmail = records.filter(function(r){return (r.data||{}).email;}).length;
  var noEmail = total - withEmail;
  // อัตราผ่านต่อตำแหน่ง
  var posStat = {};
  records.forEach(function(r){
    var p=(r.data||{}).pos1||'(ไม่ระบุ)';
    posStat[p]=posStat[p]||{total:0,pass:0};
    posStat[p].total++;
    if(r.status==='ผ่าน') posStat[p].pass++;
  });
  // สถิติแยกตามแผนก (ดึงแผนกจากตำแหน่งที่ผู้สมัครเลือก)
  var deptStat = {};
  records.forEach(function(r){
    var dep = deptOf((r.data||{}).pos1) || '(ไม่ระบุแผนก)';
    deptStat[dep]=deptStat[dep]||{total:0,pass:0,intv:0};
    deptStat[dep].total++;
    if(r.status==='ผ่าน') deptStat[dep].pass++;
    if(r.status==='นัดสัมภาษณ์') deptStat[dep].intv++;
  });
  var statusBars = curStages().map(function(s){
    var n=byStatus[s]||0; var pct= total? Math.round(n/total*100):0;
    return '<div class="stat-bar-row"><div class="stat-bar-label">'+s+'</div>'
      + '<div class="stat-bar-track"><div class="stat-bar-fill st-fill-'+s+'" style="width:'+pct+'%"></div></div>'
      + '<div class="stat-bar-val">'+n+' ('+pct+'%)</div></div>';
  }).join('');
  // แถบสัดส่วนผู้สมัครแยกแผนก
  var deptKeys = Object.keys(deptStat).sort(function(x,y){ return deptStat[y].total - deptStat[x].total; });
  var deptBars = deptKeys.map(function(dep){
    var n=deptStat[dep].total; var pct= total? Math.round(n/total*100):0;
    return '<div class="stat-bar-row"><div class="stat-bar-label" style="width:130px">'+esc(dep)+'</div>'
      + '<div class="stat-bar-track"><div class="stat-bar-fill" style="width:'+pct+'%;background:#2c7a7b"></div></div>'
      + '<div class="stat-bar-val">'+n+' ('+pct+'%)</div></div>';
  }).join('');
  var deptRows = deptKeys.map(function(dep){
    var st=deptStat[dep]; var rate= st.total? Math.round(st.pass/st.total*100):0;
    return '<tr><td>'+esc(dep)+'</td><td style="text-align:center">'+st.total+'</td><td style="text-align:center">'+st.intv+'</td><td style="text-align:center">'+st.pass+'</td><td style="text-align:center">'+rate+'%</td></tr>';
  }).join('');
  var posRows = Object.keys(posStat).map(function(p){
    var st=posStat[p]; var rate= st.total? Math.round(st.pass/st.total*100):0;
    return '<tr><td>'+esc(p)+'</td><td style="text-align:center">'+st.total+'</td><td style="text-align:center">'+st.pass+'</td><td style="text-align:center">'+rate+'%</td></tr>';
  }).join('');
  return '<div class="toolbar">'+reportBack()+'<h2 style="font-size:16px;color:var(--primary);margin-left:8px">📊 รายงานภาพรวม / สถิติ</h2>'
    + '<div style="margin-left:auto"><button class="btn btn-sm btn-primary" onclick="printReport(\'รายงานภาพรวมสถิติ\')">🖨 พิมพ์</button></div></div>'
    + '<div id="reportPrintArea"><div class="report-head-print">รายงานภาพรวม / สถิติการรับสมัคร — '+esc((settings&&settings.company&&settings.company.name)||'Akara Resources')+'<br><span style="font-size:11px;font-weight:400">พิมพ์เมื่อ '+dateTH(new Date().toISOString())+'</span></div>'
    + '<div class="stat-summary-row">'
    + '<div class="stat-box"><div class="stat-box-num">'+total+'</div><div class="stat-box-lbl">ผู้สมัครทั้งหมด</div></div>'
    + '<div class="stat-box"><div class="stat-box-num">'+(byStatus['ผ่าน']||0)+'</div><div class="stat-box-lbl">ผ่านการคัดเลือก</div></div>'
    + '<div class="stat-box"><div class="stat-box-num">'+deptKeys.length+'</div><div class="stat-box-lbl">แผนกที่มีผู้สมัคร</div></div>'
    + '<div class="stat-box"><div class="stat-box-num">'+noEmail+'</div><div class="stat-box-lbl">ติดต่อทางโทรศัพท์</div></div>'
    + '</div>'

function reportBulkSlip(){
  var withAppt = [];
  records.forEach(function(r){
    var a=r.appts||{};
    APPT_TYPES.forEach(function(t){
      if(a[t.k] && a[t.k].date) withAppt.push({rec:r,type:t,appt:a[t.k]});
    });
  });
  withAppt.sort(function(x,y){ return (x.appt.date) < (y.appt.date) ? -1 : 1; });
  var rows = withAppt.map(function(x){
    var d=x.rec.data||{}; var key=x.rec.id+'__'+x.type.k;
    var checked = bulkSlipSel[key] ? 'checked' : '';
    return '<tr><td style="text-align:center"><input type="checkbox" '+checked+' onchange="toggleBulkSlip(\''+key+'\')"></td>'
      + '<td>'+x.type.icon+' '+x.type.l+'</td>'
      + '<td><strong>'+dateTH(x.appt.date)+'</strong>'+(x.appt.time?' '+esc(x.appt.time):'')+'</td>'
      + '<td>'+esc(d.firstName)+' '+esc(d.lastName)+'</td>'
      + '<td>'+esc(d.pos1||'-')+'</td>'
      + '<td>'+esc(x.appt.place||'-')+'</td></tr>';
  }).join('');
  var selCount = Object.keys(bulkSlipSel).filter(function(k){return bulkSlipSel[k];}).length;
  var allSelected = withAppt.length>0 && withAppt.every(function(x){ return bulkSlipSel[x.rec.id+'__'+x.type.k]; });
  var table = withAppt.length
    ? '<div style="margin-bottom:10px;display:flex;gap:8px;align-items:center"><button class="btn btn-sm" onclick="bulkSlipAll('+(!allSelected)+')">'+(allSelected?'ยกเลิกทั้งหมด':'เลือกทั้งหมด')+'</button>'
      + '<span style="font-size:13px;color:var(--muted)">เลือกแล้ว '+selCount+' รายการ</span></div>'
      + '<table class="ats-table"><thead><tr><th style="width:40px">✓</th><th>ประเภท</th><th>วันเวลา</th><th>ผู้สมัคร</th><th>ตำแหน่ง</th><th>สถานที่</th></tr></thead><tbody>'+rows+'</tbody></table>'
    : '<div class="empty-state">ยังไม่มีผู้สมัครที่มีนัดหมาย</div>';
  return '<div class="toolbar">'+reportBack()+'<h2 style="font-size:16px;color:var(--primary);margin-left:8px">🖨 พิมพ์ใบนัดหมายจำนวนมาก</h2>'
    + '<div style="margin-left:auto"><button class="btn btn-sm btn-primary" '+(selCount?'':'disabled')+' onclick="printBulkSlips()">🖨 พิมพ์ใบนัดที่เลือก ('+selCount+')</button></div></div>'
    + '<div class="alert alert-info" style="font-size:12px">เลือกผู้สมัครที่ต้องการพิมพ์ใบนัด แล้วกดพิมพ์ — ระบบจะรวมใบนัดทั้งหมดเป็นหน้าๆ พิมพ์ทีเดียว หรือบันทึกเป็น PDF ส่ง LINE ได้</div>'
    + table;
}
function toggleBulkSlip(key){ bulkSlipSel[key]=!bulkSlipSel[key]; render(); }
function bulkSlipAll(on){
  var withAppt=[];
  records.forEach(function(r){ var a=r.appts||{}; APPT_TYPES.forEach(function(t){ if(a[t.k]&&a[t.k].date) withAppt.push(r.id+'__'+t.k); }); });
  withAppt.forEach(function(k){ bulkSlipSel[k]=on; });
  render();
}
function printBulkSlips(){
  var keys = Object.keys(bulkSlipSel).filter(function(k){return bulkSlipSel[k];});
  if(!keys.length){ alert('กรุณาเลือกอย่างน้อย 1 รายการ'); return; }
  var html='';
  keys.forEach(function(key){
    var parts=key.split('__'); var recId=parts[0], typeKey=parts[1];
    var r=records.filter(function(x){return x.id===recId;})[0]; if(!r) return;
    html += buildSlipHTML(r, typeKey);
  });
  var pa=$('printArea'); pa.innerHTML=html;
  document.body.classList.remove('preview-mode');
  document.body.classList.add('printing');
  setTimeout(function(){ window.print(); document.body.classList.remove('printing'); }, 150);
}

  document.body.classList.add('printing');
  setTimeout(function(){ window.print(); document.body.classList.remove('printing'); }, 120);
}

var hrEdits = null;
function saveHrAccounts(){
  // ตรวจความถูกต้อง
  for(var i=0;i<hrEdits.length;i++){
    if(!hrEdits[i].user || !hrEdits[i].name){ alert('กรุณากรอกชื่อและชื่อผู้ใช้ให้ครบทุกบัญชี'); return; }
    if(hrEdits[i]._isNew && !hrEdits[i].pass){ alert('บัญชีใหม่ "'+hrEdits[i].name+'" ต้องตั้งรหัสผ่าน'); return; }
  }
  if(!confirm('บันทึกการเปลี่ยนแปลงบัญชี HR?\n\nบัญชีที่ลบจะไม่สามารถเข้าระบบได้ทันที')) return;
  var adminCount = hrEdits.filter(function(u){return u.role==='admin';}).length;
  if(adminCount<1){ alert('ต้องมีผู้ดูแลระบบ (admin) อย่างน้อย 1 คน\nกรุณากำหนดสิทธิ์ admin ให้อย่างน้อยหนึ่งบัญชีก่อนบันทึก'); return; }
  // ส่งเฉพาะ field ที่จำเป็น: ถ้า pass ว่าง backend จะเก็บรหัสเดิม (ส่ง flag keepPass)
  var payload = hrEdits.map(function(u){
    var o = { user:u.user, name:u.name, role:(u.role==='admin'?'admin':'hr') };
    if(u.pass) o.pass = u.pass; else o.keepPass = true;
    return o;
  });
  apiSaveHrUsers(payload).then(function(){
    toast('บันทึกบัญชี HR แล้ว');
    hrEdits = null;
    // refresh list
    apiSettings().then(function(res){ if(res.hrUsers) hrUsersList=res.hrUsers; render(); });
  }).catch(function(err){ alert('บันทึกไม่สำเร็จ: '+err.message); });
}

function printApptSlip(typeKey){
  if(!currentRec) return;
  var a = (currentRec.appts||{})[typeKey];
  if(!a){ alert('ยังไม่มีข้อมูลนัดหมาย'); return; }
  var pa = $('printArea');
  pa.innerHTML = buildSlipHTML(currentRec, typeKey);
  document.body.classList.remove('preview-mode');
  document.body.classList.add('printing');
  setTimeout(function(){ window.print(); document.body.classList.remove('printing'); }, 120);
}
function printRecord(rec){
  if(!rec){ alert('ไม่พบข้อมูลสำหรับพิมพ์'); return; }
  var pa = $('printArea');
  pa.innerHTML = buildPrintDoc(rec);
  document.body.classList.remove('preview-mode');
  document.body.classList.add('printing');
  setTimeout(function(){
    window.print();
    document.body.classList.remove('printing');
  }, 120);
}
function previewPrint(rec){
  if(!rec) return;
  var pa = $('printArea');
  if(document.body.classList.contains('preview-mode')){
    document.body.classList.remove('preview-mode'); pa.innerHTML=''; return;
  }
  pa.innerHTML = '<div style="text-align:center;padding:6mm 0"><button class="btn btn-primary" onclick="printRecord(currentRec)">🖨 พิมพ์ / PDF</button> <button class="btn" onclick="previewPrint(currentRec)">✕ ปิดตัวอย่าง</button></div>' + buildPrintDoc(rec);
  document.body.classList.add('preview-mode');
  pa.scrollIntoView({behavior:'smooth'});
}

  });
  var ws = XLSX.utils.aoa_to_sheet(rows);

function exportOne(rec){
  if(typeof XLSX==='undefined'){ alert('โหลด library ไม่สำเร็จ'); return; }
  var d = rec.data||{};
  var wb = XLSX.utils.book_new();
  var rows = [
    ['แบบฟอร์ม', CONFIG.DOC.no+' Rev.'+CONFIG.DOC.rev, 'Effective', CONFIG.DOC.effective],
    ['เลขรับ', rec.id, 'วันที่สมัคร', dateTH(rec.ts), 'สถานะ', rec.status],
    [],
    ['ตำแหน่ง 1', d.pos1, 'ตำแหน่ง 2', d.pos2, 'ตำแหน่ง 3', d.pos3],
    ['เงินเดือนที่คาดหวัง', d.salary],
    ['ชื่อ-นามสกุล', (d.firstName||'')+' '+(d.lastName||''), 'วันเกิด', dateTH(d.dob)],
    ['โทร', d.phone, 'อีเมล', d.email, 'Line', d.lineId],
    ['เลขบัตร', d.idCard, 'หมดอายุ', dateTH(d.idExpiry), 'สถานะทหาร', milLabel(d.military)],
    ['ที่อยู่ทะเบียนบ้าน', d.houseAddr],
    ['ที่อยู่ปัจจุบัน', d.presentAddr],
    [],
    ['การศึกษา','สถาบัน','สาขา','ปีจบ','GPA']
  ];
  EDU_LEVELS.forEach(function(lv){
    var e=(d.edu||{})[lv.k]||{};
    if(e.ins||e.field) rows.push([lv.l, e.ins, e.field, e.year, e.gpa]);
  });
  rows.push([]);
  rows.push(['บริษัท','ตำแหน่ง','เงินเดือน','จาก','ถึง','ลักษณะงาน','สาเหตุลาออก']);
  (d.works||[]).filter(function(w){return w.company;}).forEach(function(w){
    rows.push([w.company,w.position,w.salary,monthTH(w.from),monthTH(w.to),w.acc,w.reason]);
  });
  rows.push([]);
  rows.push(['คอมพิวเตอร์', (d.compSkills||[]).filter(Boolean).join(', ')]);
  rows.push(['ภาษา', (d.langSkills||[]).filter(function(l){return l.lang;}).map(function(l){return l.lang+' '+(l.level||'');}).join(', ')]);
  rows.push(['ฉุกเฉิน', d.emgName, d.emgPhone, d.emgAddr, d.emgRel]);
  if((d.docs||[]).length){
    rows.push([]);
    rows.push(['เอกสารแนบ','ประเภท','ขนาด','ลิงก์']);
    d.docs.forEach(function(f){
      var t = DOC_TYPES.filter(function(x){return x.k===f.type;})[0];
      rows.push([f.name, t?t.l:f.type, fmtSize(f.size||0), f.url||'']);
    });
  }
  PDPA_ITEMS.forEach(function(it,i){
    var v=(d.pdpa||{})[it.k];
    rows.push(['PDPA ข้อ '+(i+1), v===true?'ยินยอม':v===false?'ไม่ยินยอม':'ไม่ระบุ']);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:32},{wch:18},{wch:16},{wch:18},{wch:28},{wch:24}];
  XLSX.utils.book_append_sheet(wb, ws, 'ใบสมัคร');
  XLSX.writeFile(wb, 'JobApp_'+(rec.id||'')+'_'+(d.firstName||'')+'.xlsx');
}

// ─── Main render ──────────────────────────────────────────────────────
function render(){
  var c = $('appView');
  var tag = $('modeTag');
  var hl = $('hrLink');
  var inHR = (view==='dashboard'||view==='detail');
  document.querySelector('.container').classList.toggle('wide', inHR);
  if(tag) tag.innerHTML = inHR ? '<span class="mode-tag" style="background:#fff;border-color:#fff">HR: '+esc((session&&session.name)||'')+'</span>' : '';
  if(hl) hl.textContent = (inHR||view==='login') ? '← หน้าประกาศรับสมัคร' : 'สำหรับเจ้าหน้าที่ HR';

  if(view==='home'){ c.innerHTML = viewHome(); return; }
  if(view==='login'){ c.innerHTML = viewLogin(); var p=$('hrPass'); if(p)p.focus(); return; }
  if(view==='dashboard'){ c.innerHTML = viewDashboard(); return; }
  if(view==='detail'){ c.innerHTML = viewDetail(); return; }
  if(view==='success'){ c.innerHTML = viewSuccess(); return; }

  // apply mode
  var backHome = '<div style="margin-bottom:12px"><a style="font-size:12px;color:var(--primary);cursor:pointer" onclick="view=\'home\';loadHome()">← กลับหน้าประกาศรับสมัคร</a></div>';
  var stepper = '<div class="stepper">'+STEPS.map(function(s,i){
    return '<div class="step-item '+(i<cur?'done':i===cur?'active':'')+'" onclick="goStep('+i+')"><div class="step-dot">'+(i<cur?'✓':(i+1))+'</div><div class="step-label">'+s+'</div></div>';
  }).join('')+'</div>';
  var builders=[buildStep0,buildStep1,buildStep2,buildStep3,buildStep4,buildStepDocs,buildStep5];
  var body = builders[cur] ? builders[cur]() : '';
  var nav = '<div class="nav-bar">'
    + '<button class="btn btn-outline" id="btnPrev" onclick="prevStep()"'+(cur===0?' disabled':'')+'>← ย้อนกลับ</button>'
    + '<span class="step-info">ขั้นตอนที่ '+(cur+1)+' / '+STEPS.length+'</span>'
    + '<button class="btn '+(cur===STEPS.length-1?'btn-success':'btn-primary')+'" id="btnNext" onclick="nextStep()">'+(cur===STEPS.length-1?'✓ ส่งใบสมัคร':'ถัดไป →')+'</button>'
    + '</div>';
  c.innerHTML = backHome + stepper + body + nav;
}
